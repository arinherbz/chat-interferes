services:
  - type: web
    name: ariostore-gadgets
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && if [ -n "$DATABASE_URL" ]; then npm run db:push; fi && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SESSION_SECRET
        generateValue: true
