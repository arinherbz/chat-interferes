services:
  app:
    build: .
    container_name: techpos-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      DATABASE_URL: ./.data/dev.sqlite
      VITE_API_URL: http://127.0.0.1:5000
      TZ: Africa/Kampala
    volumes:
      - app_data:/app/.data
      - app_uploads:/app/uploads
    restart: unless-stopped

volumes:
  app_data:
  app_uploads:
